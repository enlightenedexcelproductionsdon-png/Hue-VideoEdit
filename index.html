<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The IHTX-er Video Edition</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --panel-color: #1e1e1e;
            --accent-color: #0078d7;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .editor-container {
            width: 90%;
            max-width: 900px;
            background: var(--panel-color);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        header h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--accent-color);
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            line-height: 0;
        }

        video {
            width: 100%;
            height: auto;
            transition: filter 0.05s linear;
        }

        .controls {
            margin-top: 25px;
            display: grid;
            gap: 20px;
        }

        .slider-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slider-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #444;
        }

        .primary-btn {
            background: var(--accent-color);
        }

        .primary-btn:hover {
            background: #005a9e;
        }
    </style>
</head>
<body>

<div class="editor-container">
    <header>
        <h1>HTML Video Editor</h1>
    </header>

    <div class="video-wrapper">
        <video id="mainVideo" autoplay loop muted>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>
    </div>

    <div class="controls">
        <div class="slider-box">
            <div class="slider-info">
                <label>Hue Rotation</label>
                <span id="hueDisplay">0°</span>
            </div>
            <input type="range" id="hueInput" min="0" max="360" value="0">
        </div>

        <div class="btn-group">
            <button id="resetBtn">Reset</button>
            <button class="primary-btn" onclick="document.getElementById('mainVideo').play()">Play</button>
            <button class="primary-btn" onclick="document.getElementById('mainVideo').pause()">Pause</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('mainVideo');
    const hueInput = document.getElementById('hueInput');
    const hueDisplay = document.getElementById('hueDisplay');
    const resetBtn = document.getElementById('resetBtn');

    // Live Hue Update
    hueInput.addEventListener('input', (e) => {
        const val = e.target.value;
        hueDisplay.textContent = `${val}°`;
        video.style.filter = `hue-rotate(${val}deg)`;
    });

    // Reset Logic
    resetBtn.addEventListener('click', () => {
        hueInput.value = 0;
        hueDisplay.textContent = '0°';
        video.style.filter = 'hue-rotate(0deg)';
    });
</script>

</body>
</html>
